# ── Add this to /root/platform/nginx/nginx.conf ──────────────────────
# ── Place INSIDE the http {} block, before the closing } ─────────────

    # ═══════════════════════════════════════════════════════════════════
    # wemembers.store
    # ═══════════════════════════════════════════════════════════════════

    # ── HTTP (ACME challenge + redirect to HTTPS once cert is ready) ─
    server {
        listen 80;
        server_name wemembers.store www.wemembers.store;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            # Comment this out once SSL cert is obtained
            # return 301 https://$host$request_uri;

            # For now: serve directly via HTTP (or redirect to HTTPS if cert exists)
            set $backend http://wemembers:3000;
            proxy_pass $backend;
        }
    }

