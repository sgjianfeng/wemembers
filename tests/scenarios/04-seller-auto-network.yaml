name: "Seller Auto-Network / Non-Network Rejected"
description: A入网可接余额，未入网C接余额403

steps:
  - name: A发码
    api: { method: POST, path: /api/auth/send-code, body: { contact: "+6592600401", purpose: "register" }, expect: 200 }
  - name: A读码
    db: { model: verificationCode, method: findFirst, args: { where: { contact: "+6592600401" }, orderBy: { createdAt: desc } }, set: { ca: "code" } }
  - name: 注册A
    api: { method: POST, path: /api/auth/register, body: { contact: "+6592600401", code: "${ca}", role: business, displayName: "A餐厅", businessName: "A餐厅", businessCategory: food }, expect: 200 }
    set: { token_a: "$.data.token" }

  - name: C发码
    api: { method: POST, path: /api/auth/send-code, body: { contact: "+6592600402", purpose: "register" }, expect: 200 }
  - name: C读码
    db: { model: verificationCode, method: findFirst, args: { where: { contact: "+6592600402" }, orderBy: { createdAt: desc } }, set: { cc: "code" } }
  - name: 注册C(不入网)
    api: { method: POST, path: /api/auth/register, body: { contact: "+6592600402", code: "${cc}", role: business, displayName: "C餐厅", businessName: "C餐厅", businessCategory: food }, expect: 200 }
    set: { token_c: "$.data.token" }

  - name: 客户发码
    api: { method: POST, path: /api/auth/send-code, body: { contact: "+6592600403", purpose: "register" }, expect: 200 }
  - name: 客户读码
    db: { model: verificationCode, method: findFirst, args: { where: { contact: "+6592600403" }, orderBy: { createdAt: desc } }, set: { ccust: "code" } }
  - name: 注册客户
    api: { method: POST, path: /api/auth/register, body: { contact: "+6592600403", code: "${ccust}", role: customer, displayName: "赵六" }, expect: 200 }
    set: { cust_token: "$.data.token" }

  - name: A创建活动入网
    api: { method: POST, path: /api/business/campaigns, body: { name: "A店抽奖", type: lucky_draw_v2, startDate: "2026-06-01T00:00:00Z", endDate: "2026-12-31T00:00:00Z", slug: "s4", budgetPercent: 20 }, cookie: "${token_a}", expect: 200 }

  - name: 客户买S$100券
    api: { method: POST, path: /api/voucher/purchase?slug=s4, body: { amountSgd: 100, spendNowSgd: 30 }, cookie: "${cust_token}", expect: 200 }
    set: { voucher_id: "$.data.voucher.id" }

  - name: C接余额403
    api: { method: POST, path: /api/voucher/redeem, body: { voucherId: "${voucher_id}", amountCents: 2000 }, cookie: "${token_c}", expect: 403 }

  - name: A接余额200
    api: { method: POST, path: /api/voucher/redeem, body: { voucherId: "${voucher_id}", amountCents: 2000 }, cookie: "${token_a}", expect: 200 }
