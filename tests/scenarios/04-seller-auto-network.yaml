# 场景 4：售券方自动进入余额消费网络
name: "Seller Auto-Enters Spending Network"
description: >
  餐厅A创建 lucky_draw_v2 活动 → 自动入网 → 可以接别家余额。
  未入网的餐厅C接余额 → 403 拒绝。

steps:
  - name: "注册餐厅A（入网）"
    api:
      method: POST
      path: /api/auth/register
      body:
        contact: "${BIZ_PHONE_4A}"
        code: "123456"
        role: "business"
        displayName: "A餐厅"
        businessName: "A餐厅"
        businessCategory: "food"
      expect: 200
    set:
      token_a: "$.data.token"

  - name: "注册餐厅C（不入网）"
    api:
      method: POST
      path: /api/auth/register
      body:
        contact: "${BIZ_PHONE_4C}"
        code: "123456"
        role: "business"
        displayName: "C餐厅"
        businessName: "C餐厅"
        businessCategory: "food"
      expect: 200
    set:
      token_c: "$.data.token"

  - name: "注册客户"
    api:
      method: POST
      path: /api/auth/register
      body:
        contact: "${CUST_PHONE_4}"
        code: "123456"
        role: "customer"
        displayName: "赵六"
      expect: 200
    set:
      cust_token: "$.data.token"

  # ── 餐厅A 创建活动 → 自动入网 ──
  - name: "餐厅A 创建 lucky_draw_v2 活动"
    api:
      method: POST
      path: /api/business/campaigns
      cookie: "${token_a}"
      body:
        name: "A店购券抽奖"
        type: "lucky_draw_v2"
        startDate: "${START_DATE}"
        endDate: "${END_DATE}"
        slug: "${SLUG_4}"
        budgetPercent: 20
      expect: 200

  - name: "客户在A购买S$100券"
    api:
      method: POST
      path: /api/voucher/purchase?slug=${SLUG_4}
      cookie: "${cust_token}"
      body:
        amountSgd: 100
        spendNowSgd: 30
      expect: 200
    set:
      voucher_id: "$.data.voucher.id"

  # ── 餐厅C（未入网）尝试核销 → 应被拒 ──
  - name: "餐厅C（未入网）尝试接余额 → 403"
    api:
      method: POST
      path: /api/voucher/redeem
      cookie: "${token_c}"
      body:
        voucherId: "${voucher_id}"
        amountCents: 2000
      expect: 403
    log: "未入网被正确拒绝"

  # ── 餐厅A（已入网）可以接余额 ──
  - name: "餐厅A 核销 S$20 余额 → 200"
    api:
      method: POST
      path: /api/voucher/redeem
      cookie: "${token_a}"
      body:
        voucherId: "${voucher_id}"
        amountCents: 2000
      expect: 200
    set:
      remaining: "$.data.voucher.remainingBalanceSgd"

  - name: "验证：餐厅A核销成功，A作为核销方也能接余额"
    log: "核销成功，剩余余额: S$${remaining}"
