name: "Pool Status → Countdown → Purchase Refresh"
description: 查看奖池进度+倒计时，购券后刷新

steps:
  - name: 商家发码
    api: { method: POST, path: /api/auth/send-code, body: { contact: "+6592600501", purpose: "register" }, expect: 200 }
  - name: 商家读码
    db: { model: verificationCode, method: findFirst, args: { where: { contact: "+6592600501" }, orderBy: { createdAt: desc } }, set: { cbiz: "code" } }
  - name: 注册商家
    api: { method: POST, path: /api/auth/register, body: { contact: "+6592600501", code: "${cbiz}", role: business, displayName: "测试火锅", businessName: "测试火锅", businessCategory: food }, expect: 200 }
    set: { biz_token: "$.data.token" }

  - name: 客户发码
    api: { method: POST, path: /api/auth/send-code, body: { contact: "+6592600502", purpose: "register" }, expect: 200 }
  - name: 客户读码
    db: { model: verificationCode, method: findFirst, args: { where: { contact: "+6592600502" }, orderBy: { createdAt: desc } }, set: { ccust: "code" } }
  - name: 注册客户
    api: { method: POST, path: /api/auth/register, body: { contact: "+6592600502", code: "${ccust}", role: customer, displayName: "孙七" }, expect: 200 }
    set: { cust_token: "$.data.token" }

  - name: 创建活动
    api: { method: POST, path: /api/business/campaigns, body: { name: "火锅抽奖", type: lucky_draw_v2, startDate: "2026-06-01T00:00:00Z", endDate: "2026-12-31T00:00:00Z", slug: "s5", budgetPercent: 20, instantPoolRatio: 10, midPoolRatio: 60, grandPoolRatio: 30 }, cookie: "${biz_token}", expect: 200 }

  - name: 购券前查看奖池
    api: { method: GET, path: /api/campaign/pool-status?slug=s5, expect: 200 }

  - name: 买S$100券
    api: { method: POST, path: /api/voucher/purchase?slug=s5, body: { amountSgd: 100, spendNowSgd: 40 }, cookie: "${cust_token}", expect: 200 }

  - name: 购券后查看奖池
    api: { method: GET, path: /api/campaign/pool-status?slug=s5, expect: 200 }

  - name: draw API返回v2
    api: { method: GET, path: /api/draw/s5, expect: 200 }
