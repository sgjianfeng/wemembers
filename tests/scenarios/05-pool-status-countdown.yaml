# 场景 5：奖池状态 + 预计倒计时 + 进度条
name: "Pool Status → Countdown → Progress After Purchase"
description: >
  查看奖池状态，验证即时池/中奖池/梦想池三层 + 预计倒计时。
  购券后刷新刷新，验证计数器增长。

steps:
  - name: "商家 — 发验证码"
    api: { method: POST, path: /api/auth/send-code, body: { contact: "+6590384435", purpose: "register" }, expect: 200 }
  - name: "商家 — 读验证码"
    db: { model: verificationCode, method: findFirst, args: { where: { contact: "+6590384435", purpose: "register" }, orderBy: { createdAt: desc } }, set: { code_biz: "code" } }
  - name: "注册商家"
    api: { method: POST, path: /api/auth/register, body: { contact: "+6590384435", code: "${code_biz}", role: business, displayName: "测试火锅", businessName: "测试火锅", businessCategory: food }, expect: 200 }
    set: { biz_token: "$.data.token" }

  - name: "客户 — 发验证码"
    api: { method: POST, path: /api/auth/send-code, body: { contact: "+6590384435", purpose: "register" }, expect: 200 }
  - name: "客户 — 读验证码"
    db: { model: verificationCode, method: findFirst, args: { where: { contact: "+6590384435", purpose: "register" }, orderBy: { createdAt: desc } }, set: { code_cust: "code" } }
  - name: "注册客户"
    api: { method: POST, path: /api/auth/register, body: { contact: "+6590384435", code: "${code_cust}", role: customer, displayName: "孙七" }, expect: 200 }
    set: { cust_token: "$.data.token" }

  - name: "创建购券抽奖活动"
    api: { method: POST, path: /api/business/campaigns, body: { name: "火锅店购券抽奖", type: lucky_draw_v2, startDate: "2026-06-01T00:00:00Z", endDate: "2026-12-31T00:00:00Z", slug: "scenario-5-${RUN}", budgetPercent: 20, instantPoolRatio: 10, midPoolRatio: 60, grandPoolRatio: 30 }, cookie: "${biz_token}", expect: 200 }

  # ═══ 购券前查看奖池 ═══
  - name: "购券前查看奖池状态"
    api: { method: GET, path: /api/campaign/pool-status?slug=scenario-5, expect: 200 }

  # ═══ 购券后刷新 ═══
  - name: "购买S$100券"
    api: { method: POST, path: /api/voucher/purchase?slug=scenario-5, body: { amountSgd: 100, spendNowSgd: 40 }, cookie: "${cust_token}", expect: 200 }

  - name: "购券后再次查看奖池"
    api: { method: GET, path: /api/campaign/pool-status?slug=scenario-5, expect: 200 }

  # ═══ 公开 draw API ═══
  - name: "公开 draw API 返回 v2 数据"
    api: { method: GET, path: /api/draw/scenario-5,- expect: 200 }
