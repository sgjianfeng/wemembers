name: "Small Tier → Upgrade → Large Tier 2x Weight"
description: 先买S$20不进入大奖池，再买S$100得2x权重

steps:
  - name: 商家发码
    api: { method: POST, path: /api/auth/send-code, body: { contact: "+6592600201", purpose: "register" }, expect: 200 }
  - name: 商家读码
    db: { model: verificationCode, method: findFirst, args: { where: { contact: "+6592600201" }, orderBy: { createdAt: desc } }, set: { cbiz: "code" } }
  - name: 注册商家
    api: { method: POST, path: /api/auth/register, body: { contact: "+6592600201", code: "${cbiz}", role: business, displayName: "测试面馆", businessName: "测试面馆", businessCategory: food }, expect: 200 }
    set: { biz_token: "$.data.token" }

  - name: 客户发码
    api: { method: POST, path: /api/auth/send-code, body: { contact: "+6592600202", purpose: "register" }, expect: 200 }
  - name: 客户读码
    db: { model: verificationCode, method: findFirst, args: { where: { contact: "+6592600202" }, orderBy: { createdAt: desc } }, set: { ccust: "code" } }
  - name: 注册客户
    api: { method: POST, path: /api/auth/register, body: { contact: "+6592600202", code: "${ccust}", role: customer, displayName: "李四" }, expect: 200 }
    set: { cust_token: "$.data.token" }

  - name: 创建活动
    api: { method: POST, path: /api/business/campaigns, body: { name: "面馆抽奖", type: lucky_draw_v2, startDate: "2026-06-01T00:00:00Z", endDate: "2026-12-31T00:00:00Z", slug: "s2", budgetPercent: 20 }, cookie: "${biz_token}", expect: 200 }

  - name: 买S$20券
    api: { method: POST, path: /api/voucher/purchase?slug=s2, body: { amountSgd: 20, spendNowSgd: 5 }, cookie: "${cust_token}", expect: 200 }
    set: { small_prize: "$.data.instantPrize.name", small_grand: "$.data.grandPoolEntry" }
  - name: 验证小额不进入大奖池
    log: "S$20: ${small_prize}, 大奖池=${small_grand}(expect false)"

  - name: 买S$100券
    api: { method: POST, path: /api/voucher/purchase?slug=s2, body: { amountSgd: 100, spendNowSgd: 0 }, cookie: "${cust_token}", expect: 200 }
    set: { large_prize: "$.data.instantPrize.name", large_weight: "$.data.voucher.drawWeight", large_grand: "$.data.grandPoolEntry" }
  - name: 验证大额2x权重
    log: "S$100: ${large_prize}, 大奖池=${large_grand}, weight=${large_weight}(expect 20000)"
