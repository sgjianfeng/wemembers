name: "Share Boost → Doubled → Blocked"
description: 分享后权重从20000变30000，再次分享被拒

steps:
  - name: 商家发码
    api: { method: POST, path: /api/auth/send-code, body: { contact: "+6592600301", purpose: "register" }, expect: 200 }
  - name: 商家读码
    db: { model: verificationCode, method: findFirst, args: { where: { contact: "+6592600301" }, orderBy: { createdAt: desc } }, set: { cbiz: "code" } }
  - name: 注册商家
    api: { method: POST, path: /api/auth/register, body: { contact: "+6592600301", code: "${cbiz}", role: business, displayName: "C餐厅", businessName: "C餐厅", businessCategory: food }, expect: 200 }
    set: { biz_token: "$.data.token" }

  - name: 客户发码
    api: { method: POST, path: /api/auth/send-code, body: { contact: "+6592600302", purpose: "register" }, expect: 200 }
  - name: 客户读码
    db: { model: verificationCode, method: findFirst, args: { where: { contact: "+6592600302" }, orderBy: { createdAt: desc } }, set: { ccust: "code" } }
  - name: 注册客户
    api: { method: POST, path: /api/auth/register, body: { contact: "+6592600302", code: "${ccust}", role: customer, displayName: "王五" }, expect: 200 }
    set: { cust_token: "$.data.token" }

  - name: 创建活动
    api: { method: POST, path: /api/business/campaigns, body: { name: "分享测试", type: lucky_draw_v2, startDate: "2026-06-01T00:00:00Z", endDate: "2026-12-31T00:00:00Z", slug: "s3", budgetPercent: 20 }, cookie: "${biz_token}", expect: 200 }

  - name: 买S$100券
    api: { method: POST, path: /api/voucher/purchase?slug=s3, body: { amountSgd: 100, spendNowSgd: 50 }, cookie: "${cust_token}", expect: 200 }
    set: { voucher_id: "$.data.voucher.id", weight: "$.data.voucher.drawWeight" }
  - name: 验证初始权重
    log: "初始权重: ${weight} (expect 20000)"

  - name: 第一次分享
    api: { method: POST, path: /api/campaign/share-boost, body: { voucherId: "${voucher_id}" }, cookie: "${cust_token}", expect: 200 }
    set: { new_weight: "$.data.newWeight" }
  - name: 验证权重增加
    log: "新权重: ${new_weight} (expect 30000)"

  - name: 第二次分享被拒
    api: { method: POST, path: /api/campaign/share-boost, body: { voucherId: "${voucher_id}" }, cookie: "${cust_token}", expect: 400 }
