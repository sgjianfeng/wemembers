# еңәжҷҜ 1пјҡиҙӯеҲё + дёӯеҘ– + и·Ёеә—ж¶Ҳиҙ№е®Ңж•ҙж—…зЁӢ
name: "Voucher Purchase вҶ’ Win вҶ’ Cross-Store Redemption"
description: >
  е®ўжҲ·еңЁйӨҗеҺ…Aиҙӯд№°S$100еҲёпјҢзҺ°еңәж¶Ҳиҙ№S$10пјҢдёӯеҚіж—¶еҘ–пјҢдҪҷйўқS$90гҖӮ
  еҺ»е’–е•Ўеә—Bж¶Ҳиҙ№S$15дҪҷйўқгҖӮйӘҢиҜҒеҘ–жұ гҖҒдҪҷйўқгҖҒдёӨж¬Ўж ёй”Җзҡ„иҙ№зҺҮгҖӮ

steps:
  - name: "йӨҗеҺ…A вҖ” еҸ‘йӘҢиҜҒз Ғ"
    api: { method: POST, path: /api/auth/send-code, body: { contact: "+6592000101", purpose: "register" }, expect: 200 }
  - name: "йӨҗеҺ…A вҖ” иҜ»йӘҢиҜҒз Ғ"
    db: { model: verificationCode, method: findFirst, args: { where: { contact: "+6592000101", purpose: "register" }, orderBy: { createdAt: desc } }, set: { code_a: "code" } }
  - name: "жіЁеҶҢйӨҗеҺ…A"
    api: { method: POST, path: /api/auth/register, body: { contact: "+6592000101", code: "${code_a}", role: business, displayName: "еҘҪеҗғйӨҗеҺ…", businessName: "еҘҪеҗғйӨҗеҺ…", businessCategory: food }, expect: 200 }
    set: { token_a: "$.data.token" }

  - name: "е’–е•Ўеә—B вҖ” еҸ‘йӘҢиҜҒз Ғ"
    api: { method: POST, path: /api/auth/send-code, body: { contact: "+6592000102", purpose: "register" }, expect: 200 }
  - name: "е’–е•Ўеә—B вҖ” иҜ»йӘҢиҜҒз Ғ"
    db: { model: verificationCode, method: findFirst, args: { where: { contact: "+6592000102", purpose: "register" }, orderBy: { createdAt: desc } }, set: { code_b: "code" } }
  - name: "жіЁеҶҢе’–е•Ўеә—B"
    api: { method: POST, path: /api/auth/register, body: { contact: "+6592000102", code: "${code_b}", role: business, displayName: "йҳіе…үе’–е•Ў", businessName: "йҳіе…үе’–е•Ў", businessCategory: cafe }, expect: 200 }
    set: { token_b: "$.data.token" }

  - name: "е®ўжҲ· вҖ” еҸ‘йӘҢиҜҒз Ғ"
    api: { method: POST, path: /api/auth/send-code, body: { contact: "+6592000103", purpose: "register" }, expect: 200 }
  - name: "е®ўжҲ· вҖ” иҜ»йӘҢиҜҒз Ғ"
    db: { model: verificationCode, method: findFirst, args: { where: { contact: "+6592000103", purpose: "register" }, orderBy: { createdAt: desc } }, set: { code_c: "code" } }
  - name: "жіЁеҶҢе®ўжҲ·"
    api: { method: POST, path: /api/auth/register, body: { contact: "+6592000103", code: "${code_c}", role: customer, displayName: "еј дёү" }, expect: 200 }
    set: { cust_token: "$.data.token" }

  - name: "йӨҗеҺ…A еҲӣе»әиҙӯеҲёжҠҪеҘ–жҙ»еҠЁ"
    api: { method: POST, path: /api/business/campaigns, body: { name: "Aеә—иҙӯеҲёжҠҪеҘ–", type: lucky_draw_v2, startDate: "2026-06-01T00:00:00Z", endDate: "2026-12-31T00:00:00Z", slug: "scenario-1-a-${RUN}", budgetPercent: 20, instantPoolRatio: 10, midPoolRatio: 60, grandPoolRatio: 30 }, cookie: "${token_a}", expect: 200 }

  - name: "е’–е•Ўеә—B еҲӣе»әиҙӯеҲёжҠҪеҘ–жҙ»еҠЁпјҲе…ҘзҪ‘пјү"
    api: { method: POST, path: /api/business/campaigns, body: { name: "Bеә—иҙӯеҲёжҠҪеҘ–", type: lucky_draw_v2, startDate: "2026-06-01T00:00:00Z", endDate: "2026-12-31T00:00:00Z", slug: "scenario-1-b-${RUN}", budgetPercent: 20 }, cookie: "${token_b}", expect: 200 }

  - name: "е®ўжҲ·иҙӯд№°S$100еҲё"
    api: { method: POST, path: /api/voucher/purchase?slug=scenario-1-a, body: { amountSgd: 100, spendNowSgd: 10 }, cookie: "${cust_token}", expect: 200 }
    set: { voucher_id: "$.data.voucher.id", prize_name: "$.data.instantPrize.name" }

  - name: "йӘҢиҜҒпјҡ100%дёӯеҘ–"
    log: "рҹҺҒ еҚіж—¶еҘ–е“Ғ: ${prize_name}"

  - name: "е’–е•Ўеә—B ж ёй”Җ S$15 дҪҷйўқ"
    api: { method: POST, path: /api/voucher/redeem, body: { voucherId: "${voucher_id}", amountCents: 1500 }, cookie: "${token_b}", expect: 200 }
    set: { fee_sgd: "$.data.usage.feeSgd" }

  - name: "йӘҢиҜҒпјҡж ёй”Җж–№жүЈиҙ№20%"
    log: "ж ёй”Җиҙ№: S$${fee_sgd}пјҲеә”дёәS$3.00пјү"

  - name: "е®ўжҲ·жҹҘзңӢдҪҷйўқ"
    api: { method: GET, path: /api/voucher/my-balance, cookie: "${cust_token}", expect: 200 }

  - name: "е®ўжҲ·жҹҘзңӢж¶Ҳиҙ№и®°еҪ•"
    api: { method: GET, path: /api/voucher/usage-history, cookie: "${cust_token}", expect: 200 }
